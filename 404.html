<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname.replace('/tlms-frontend', '');
      var query = window.location.search;
      window.location.replace(
        window.location.origin + '/tlms-frontend/?p=' + encodeURIComponent(path) + (query ? '&q=' + encodeURIComponent(query) : '')
      );
    </script>
  </head>
  <body></body>
</html>
