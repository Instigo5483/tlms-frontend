  <!-- Green platform bars -->
  <rect x="58" y="142" width="84" height="9"  rx="4.5" fill="#00C48C"/>
  <rect x="66" y="152" width="68" height="7"  rx="3.5" fill="#00C48C"/>
  <rect x="74" y="160" width="52" height="5"  rx="2.5" fill="#00C48C"/>

